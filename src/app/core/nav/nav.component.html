<nav [class.scrolled]="scrolled()" [class.menu-open]="menuOpen()">
  <a routerLink="/home" class="logo" (click)="closeMenu()">
    <span class="logo-mark">◆</span>
    <span class="logo-text">Portfolio</span>
  </a>

  <ul class="nav-links" [class.open]="menuOpen()">
    @for (link of links; track link.path) {
      <li>
        <a
          [routerLink]="link.path"
          routerLinkActive="active"
          (click)="closeMenu()"
        >
          <span class="num">{{ link.num }}</span>
          <span class="label">{{ link.label }}</span>
        </a>
      </li>
    }
  </ul>

  <div class="nav-actions">
    <!-- Theme toggle -->
    <button class="theme-btn" (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (theme.isDark()) {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      }
    </button>

    <!-- Hamburger -->
    <button class="hamburger" (click)="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
