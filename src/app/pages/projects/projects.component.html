<div class="projects-page" style="padding-top: var(--nav-h)">
  <section class="section-wrap">
    <p class="section-eyebrow reveal">Work</p>
    <h1 class="section-heading reveal reveal-d1">
      Selected <em>Projects.</em>
    </h1>

    <!-- FILTERS -->
    <div class="filters reveal reveal-d2">
      @for (f of filters; track f) {
        <button
          class="filter-btn font-mono"
          [class.active]="activeFilter() === f"
          (click)="setFilter(f)"
        >{{ f }}</button>
      }
    </div>

    <!-- GRID -->
    <div class="projects-grid">
      @for (p of filtered; track p.id) {
        <article class="project-card card reveal" [class.featured]="p.featured">
          <div class="pc-thumb" [style.background]="p.gradient">
            <span class="pc-emoji">{{ p.emoji }}</span>
            @if (p.featured) {
              <span class="pc-featured font-mono">Featured</span>
            }
          </div>
          <div class="pc-body">
            <div class="pc-meta">
              <span class="pc-cat font-mono">{{ p.category }}</span>
              <span class="pc-year font-mono">{{ p.year }}</span>
            </div>
            <h2 class="pc-title">{{ p.title }}</h2>
            <p class="pc-desc">{{ p.desc }}</p>
            <div class="pc-tags">
              @for (tag of p.tags; track tag) {
                <span class="pc-tag">{{ tag }}</span>
              }
            </div>
            <div class="pc-actions">
              <a href="#" class="pc-link">
                Case Study
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                </svg>
              </a>
              <a href="#" class="pc-link pc-github" aria-label="GitHub">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                </svg>
              </a>
            </div>
          </div>
        </article>
      }
    </div>
  </section>
</div>
